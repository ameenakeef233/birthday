<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 16px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #4f46e5;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #3730a3;
        }

        #status {
            text-align: center;
            margin-top: 12px;
            font-weight: bold;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Feedback Form</h2>
        <input id="name" placeholder="NNNNNNNama" required>
        <input id="phone" placeholder="Phone" required>
        <textarea id="warna" placeholder="Warna" required></textarea>
        <button id="submitBtn">Submit</button>
        <p id="status"></p>
    </div>

    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

        const supabase = createClient(
            "https://hsankpxjtwqbbsbcuuhh.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYW5rcHhqdHdxYmJzYmN1dWhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTUzMTIsImV4cCI6MjA4NzQzMTMxMn0.xOeR33CJr5Vt_0pWsn7qPcvPt4srpTsuNYKb1qwLDZk"
        )

        window.submitForm = async () => {
            const name = document.getElementById("name").value
            const phone = document.getElementById("phone").value
            const warna = document.getElementById("warna").value

            const { error } = await supabase
                .from("submissions")
                .insert([{ name, phone, warna }])

            if (error) {
                alert(error.message)
                console.error(error)
            } else {
                alert("Submitted!")
            }
        }
    </script>

</body>

</html>
